services:
  detector:
    build:
      context: ./detector_service
      dockerfile: Dockerfile
    shm_size: "2gb"
    environment:
      - LOG_LEVEL=${LOG_LEVEL-INFO}
      - MODEL_PATH=${MODEL_PATH-/app/models/mtg_detector/weights/best.pt}
      - YOLO_CONFIDENCE=${YOLO_CONFIDENCE-0.4}
      - DETECTOR_DEBUG_DIR=${DETECTOR_DEBUG_DIR-/tmp/detector-debug}
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY-}
    ports:
      - "8002:8002"
    volumes:
      - ./detector_service/app:/app/app
      - ./data/detector-debug:/tmp/detector-debug
      - ./detector_service/models:/app/models
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]

  ocr:
    build:
      context: ./ocr_service
      dockerfile: Dockerfile
    environment:
      - LOG_LEVEL=${LOG_LEVEL-INFO}
      - TESSERACT_LANGS=${TESSERACT_LANGS-eng+ita+fra+spa+deu}
      - OCR_DEBUG_DIR=${OCR_DEBUG_DIR-/tmp/ocr-debug}
    ports:
      - "8003:8003"
    volumes:
      - ./ocr_service/app:/app/app
      - ./data/ocr-debug:/tmp/ocr-debug
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8003", "--reload"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/magic_cards
      - DETECTOR_SERVICE_URL=${DETECTOR_SERVICE_URL-http://detector:8002}
      - OCR_SERVICE_URL=${OCR_SERVICE_URL-http://ocr:8003}
      - LOG_LEVEL=${LOG_LEVEL-INFO}
      # Optional price sources (see README "Configuring optional price sources")
      - OPEN_TCG_API_ENABLED=${OPEN_TCG_API_ENABLED-0}
      - OPEN_TCG_API_BASE_URL=${OPEN_TCG_API_BASE_URL-https://tcgtracking.com/tcgapi/v1}
      - CARDMARKET_API_ENABLED=${CARDMARKET_API_ENABLED-0}
      - CARDMARKET_APP_TOKEN=${CARDMARKET_APP_TOKEN}
      - CARDMARKET_APP_SECRET=${CARDMARKET_APP_SECRET}
      - CARDMARKET_ACCESS_TOKEN=${CARDMARKET_ACCESS_TOKEN}
      - CARDMARKET_ACCESS_TOKEN_SECRET=${CARDMARKET_ACCESS_TOKEN_SECRET}
      - CARDTRADER_API_ENABLED=${CARDTRADER_API_ENABLED-0}
      - CARDTRADER_API_TOKEN=${CARDTRADER_API_TOKEN}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    depends_on:
      - backend

  db:
    image: postgres:18
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=magic_cards
    ports:
      - "5432:5432"
    volumes:
      - ./db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  frontend_node_modules:
